name: Gradle CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - gradle-java-version: '17'
            compatibility-java-version: '11'
          - gradle-java-version: '17'
            compatibility-java-version: '17'
          - gradle-java-version: '21'
            compatibility-java-version: '21'
          - gradle-java-version: '25'
            compatibility-java-version: '25'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Gradle JDK ${{ matrix.gradle-java-version }}
        id: gradle-java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.gradle-java-version }}
          distribution: 'temurin'

      - name: Set up compatibility JDK ${{ matrix.compatibility-java-version }}
        id: compatibility-java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.compatibility-java-version }}
          distribution: 'temurin'

      - name: Build with Gradle
        env:
          JAVA_HOME: ${{ steps.gradle-java.outputs.path }}
          ORG_GRADLE_JAVA_INSTALLATIONS_PATHS: ${{ steps.gradle-java.outputs.path }},${{ steps.compatibility-java.outputs.path }}
        run: ./gradlew clean build -PgenerateSources -PjavaCompatibilityVersion=${{ matrix.compatibility-java-version }}
